# Tenshinryu Hyoho Wiki — wiki.tenshinryu.xyz :3014
services:
  wiki:
    image: nginx:1.27-alpine
    container_name: tenshinryu-wiki
    restart: unless-stopped
    ports:
      - "127.0.0.1:3014:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
