server {
    listen 80;
    server_name _;

    location = / {
        default_type text/html;
        return 200 '<!DOCTYPE html><html><head><meta charset="utf-8"><title>KOReader Sync</title></head><body><h1>KOReader Sync</h1><p>Private progress sync for CrossPoint / KOReader clients.</p><p>Configure your device with this URL — there is no web UI here.</p><p><a href="/healthcheck">Health check</a></p></body></html>';
    }

    location / {
        proxy_pass http://kosync:17200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept "application/vnd.koreader.v1+json";
    }
}
