services:
  kosync:
    image: koreader/kosync:latest
    container_name: dojopop-kosync
    restart: unless-stopped
    expose:
      - "17200"
    volumes:
      - ./data/redis:/var/lib/redis
      - ./logs/app:/app/koreader-sync-server/logs
      - ./logs/redis:/var/log/redis
    environment:
      # Registration disabled after initial account setup.
      - ENABLE_USER_REGISTRATION=false
    networks:
      - dojopop-internal

  kosync-proxy:
    image: nginx:1.27-alpine
    container_name: dojopop-kosync-proxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:3007:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - kosync
    networks:
      - dojopop-internal

networks:
  dojopop-internal:
    external: true
    name: dojopop-internal
