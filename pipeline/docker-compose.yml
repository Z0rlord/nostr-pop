# YouTube PubSubHubbub callback — hooks.dojopop.live → localhost:3009
# Deploy: ./deploy.sh relay-2
services:
  youtube-pubsub:
    build:
      context: .
      dockerfile: Dockerfile.pubsub
    image: dojopop-youtube-pubsub:latest
    container_name: dojopop-youtube-pubsub
    restart: unless-stopped
    working_dir: /app
    command:
      - uv
      - run
      - --project
      - pipeline
      - pipeline/youtube_pubsub.py
      - serve
      - --host
      - "0.0.0.0"
      - --port
      - "3009"
    ports:
      - "127.0.0.1:3009:3009"
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      YT_DLP_COOKIES_FILE: /app/data/youtube-cookies.txt
