# DNS-only og.dojopop.live — bypasses Cloudflare AI Crawl Control for Meta scrapers.
# Install on relay-2: /etc/nginx/conf.d/og-dojopop.conf
# Cert: certbot certonly --dns-cloudflare -d og.dojopop.live
# DNS: A record → relay-2 public IP, proxied=false
server {
  listen 443 ssl;
  server_name og.dojopop.live;

  ssl_certificate     /etc/letsencrypt/live/og.dojopop.live/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/og.dojopop.live/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  location ~ ^/(og/practice/|hero-dojo\.jpg|v/|robots\.txt|favicon\.ico) {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host dojopop.live;
    proxy_set_header X-Forwarded-Host og.dojopop.live;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_buffering off;
  }

  location / {
    default_type text/plain;
    return 404 "og.dojopop.live serves Open Graph assets only\n";
  }
}
