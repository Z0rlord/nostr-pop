services:
  web:
    build: .
    image: dojopop-web:latest
    container_name: dojopop-web
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - RELAY_CONFIG_PATH=/relay/config.toml
      - RELAY_CONTAINER_NAME=dojopop-relay
      - DOCKER_SOCKET=/var/run/docker.sock
    volumes:
      - web-data:/app/data
      - /opt/dojopop/relay/config.toml:/relay/config.toml
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "${DOCKER_GID:-988}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  web-data:
