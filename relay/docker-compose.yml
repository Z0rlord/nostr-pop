services:
  relay:
    # Pinned: 0.10.0 (2026-05-22). Bump deliberately, not via :latest.
    image: scsibug/nostr-rs-relay:0.10.0
    container_name: dojopop-relay
    restart: unless-stopped
    ports:
      # Host 7777 -> container 8080 (nostr-rs-relay default listen port).
      - "7777:8080"
    volumes:
      - ./config.toml:/usr/src/app/config.toml:ro
      - relay-data:/usr/src/app/db
    environment:
      - RUST_LOG=warn,nostr_rs_relay=info

volumes:
  relay-data:
