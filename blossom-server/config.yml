# DojoPop self-hosted Blossom server (hzrd149/blossom-server)
# Local dev: docker compose up -d   →   http://localhost:3000
# See README.md in this directory for production notes (domain, TLS).
#
# Abuse / prohibited-content policy (ops): closed uploads (auth + pubkey rules),
# video/* + image/* only, BUD-09 PUT /report for flags, operator delete via
# BUD-02 DELETE /<sha256> (pipeline/delete_published.py) or admin dashboard.
# Report contact: admin@dojopop.live — jurisdiction-dependent; we enforce a
# prohibited-content policy, not a jurisdiction-specific legal determination.

port: 3000
host: 0.0.0.0

# Bare hostname for blob descriptor URLs (Cloudflare Tunnel on relay-2).
publicDomain: "blossom.dojopop.live"

database:
  path: data/sqlite.db

storage:
  backend: local
  local:
    dir: ./data/blobs
  removeWhenNoOwners: false

  # Retention rules double as the upload allowlist (first match wins).
  # Scoped to the DojoPop identity pubkey:
  # npub1k0v9gnwatzt0whhkdsss7hqddhke77f9zclte0yfueutms0y334qg380wg
  rules:
    - type: "video/*"
      expiration: 10 years
      pubkeys:
        - "b3d8544ddd5896f75ef66c210f5c0d6ded9f7925163ebcbc89e678bdc1e48c6a"
    - type: "image/*"
      expiration: 10 years
      pubkeys:
        - "b3d8544ddd5896f75ef66c210f5c0d6ded9f7925163ebcbc89e678bdc1e48c6a"

upload:
  enabled: true
  requireAuth: true
  # Only pubkeys listed in a storage rule may upload (closed server).
  requirePubkeyInRule: true
  # PUT /upload stores the blob as-is (no server transcode).
  # DojoPop practice clips use pipeline/ (client ffmpeg → 480p/60s) then PUT /upload.
  # Large masters (e.g. feature films) also use PUT /upload via blossom_upload.py.
  maxSize: 5368709120 # 5 GB per blob (feature-film headroom above ~4 GB masters)
  workers: 0
  maxJobsPerWorker: 4
  throughputWindowMs: 1000

# BUD-04 mirror — keep enabled for admin pipeline
# (pipeline/mirror_yakihonne_to_dojopop.py). Still gated by requireAuth +
# requirePubkeyInRule (only storage-rule pubkeys).
mirror:
  enabled: true
  requireAuth: true
  connectTimeout: 30000
  bodyTimeout: 0

delete:
  requireAuth: true

# BUD-02 list — disabled (upstream default). Public listing aids blob
# enumeration; clients fetch by known sha256 / event imeta URLs instead.
list:
  enabled: false
  requireAuth: true
  allowListOthers: false

# BUD-05 media optimisation (PUT /media only — NOT used by pipeline/ or large masters).
# Server-side 480p cap applies only when clients call /media; PUT /upload is passthrough.
# The official docker image bundles ffmpeg, so this can stay enabled for trusted /media use.
media:
  enabled: true
  requireAuth: true
  maxSize: 1073741824 # 1 GB input for /media (practice clips should use pipeline ffmpeg instead)
  image:
    quality: 90
    progressive: true
    maxWidth: 1920
    maxHeight: 1080
    outputFormat: webp
    maintainAspectRatio: true
    keepExif: false
    fps: 30
  video:
    quality: 90
    # DojoPop practice policy: 480p when a client uses PUT /media (pipeline transcodes before PUT /upload).
    maxHeight: 480
    maxFps: 30
    format: mp4
    audioCodec: aac
    videoCodec: libx264
  thumbnail:
    enabled: true
    quality: 80
    maxWidth: 512
    maxHeight: 512
    outputFormat: webp
    videoSeek: 1

prune:
  initialDelayMs: 60000
  intervalMs: 30000

landing:
  enabled: true
  title: "DojoPop Blossom"

# BUD-09 — clients PUT NIP-56 kind:1984 reports here (not on the relay).
# Review via admin dashboard when enabled (credentials via env / Doppler only).
report:
  enabled: true

# Admin dashboard — leave disabled in git. To enable on relay-2 for report
# review / force-delete, set dashboard.enabled + username/password from
# Doppler (never commit the password), then restart dojopop-blossom.
# dashboard:
#   enabled: true
#   username: admin
#   password: "${BLOSSOM_ADMIN_PASSWORD}"
#   lookupRelays:
#     - wss://relay.dojopop.live
#     - wss://purplepag.es
