# DojoPop admin placeholder — admin.dojopop.live :3002 (future ops dashboard)
services:
  admin:
    image: nginx:alpine
    container_name: dojopop-admin
    restart: unless-stopped
    ports:
      - "3002:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
